<!DOCTYPE html>
<html>
<head>
    <title>Crop Prediction</title>
    <style>
        body {
    font-family: Arial;
    background: url("{{ url_for('static', filename='images.jpg') }}") no-repeat center center fixed;
    background-size: cover; /* ✅ Make image cover the whole screen */
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}


        .container {
    background: rgba(129, 80, 119, 0.6); /* ✅ 60% opacity */
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 500px;
    text-align: center;
}



        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            text-align: left;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            border: none;
            color: rgb(133, 100, 107);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crop Recommendation System</h1>
        <form method="post">
            <label for="N">Nitrogen (N):</label>
            <input type="number" name="N" required>

            <label for="P">Phosphorous (P):</label>
            <input type="number" name="P" required>

            <label for="K">Potassium (K):</label>
            <input type="number" name="K" required>

            <label for="temperature">Temperature (°C):</label>
            <input type="text" name="temperature" required>

            <label for="humidity">Humidity (%):</label>
            <input type="text" name="humidity" required>

            <label for="ph">pH Level:</label>
            <input type="text" name="ph" required>

            <label for="rainfall">Rainfall (mm):</label>
            <input type="text" name="rainfall" required>

            <input type="submit" value="Predict Crop">
        </form>

        {% if prediction %}
        <div class="result">{{ prediction }}</div>
        {% endif %}
    </div>
</body>
</html>
